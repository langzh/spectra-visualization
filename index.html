<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>光谱数据对比平台</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body{font-family:Arial;margin:20px}
    #plot{height:500px;border:1px solid #ddd;margin-top:20px;}
    .controls{margin:20px 0;display:flex;align-items:flex-start;gap:30px;}
    .operate-box{}
    table.desc-table{
      border-collapse: collapse;
      width: 520px;
    }
    .desc-table td, .desc-table th{
      border:1px solid #666;
      padding:8px 6px;
      font-size:13px;
      color:#000;
    }
    .desc-table th{
      background:#eeeeee;
    }
    button{margin-top:8px;padding:4px 12px}
  </style>
</head>
<body>
  <h1>光谱数据可视化平台</h1>
  <div class="controls">
    <div class="operate-box">
      <label>选择光谱（分别为CCD型号-光纤直径-积分时间；
        按住Ctrl多选，可叠加对比）：</label>
      <select id="spectra-select" multiple size="5" style="width:200px"></select>
      <br>
      <button onclick="plotSelected()">绘制选中光谱</button>
    </div>
    <div>
      <h4>操作与实验说明表</h4>
      <table class="desc-table">
        <tr>
          <th>参数</th>
          <th>PG2000PRO</th>
          <th>PG2000EVO</th>
          <th>MAYA2000PRO-S</th>
          <th>MAYA2000PRO-L</th>
          <th>FX2000L+</th>
          <th>FLAMET</th>
        </tr>
        <tr>
          <td>缩写</td>
          <td>PG2000P</td>
          <td>PG2000E</td>
          <td>MayaS</td>
          <td>MayaL</td>
          <td>FX2000</td>
          <td>FLAMET</td>        
        <tr>
          <td>狭缝</td>
          <td>50μm</td>
          <td>25μm</td>
          <td>25μm</td>
          <td>5μm</td>
          <td>25μm</td>
          <td>无狭缝</td>
        </tr>
        <tr>
          <td>波长范围</td>
          <td>198.725-1124.728nm</td>
          <td>336.249-784.755nm</td>
          <td>196.00-339.51nm</td>
          <td>199.1-656.54nm</td>
          <td>192.647-844.277nm</td>
          <td>568.09-855.77nm</td>
        </tr>
      </table>
    </div>
  </div>
  <div id="plot"></div>

  <script>
    const colorList = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22'];
    let spectraData = [];

    fetch('data.json')
      .then(response => response.json())
      .then(data => {
        spectraData = data;
        const select = document.getElementById('spectra-select');
        data.forEach((spec, i) => {
          const option = document.createElement('option');
          option.value = i;
          option.textContent = spec.name;
          select.appendChild(option);
        });
      });

    function plotSelected() {
      const select = document.getElementById('spectra-select');
      const selectedIndices = Array.from(select.selectedOptions).map(opt => parseInt(opt.value));
      if (selectedIndices.length === 0) {
        alert('请至少选择一条光谱');
        return;
      }
      const traces = selectedIndices.map((idx, arrIndex) => {
        const spec = spectraData[idx];
        return {
          x: spec.wavelength,
          y: spec.intensity,
          name: spec.name,
          mode: 'lines',
          line: {
            width: 2,
            color: colorList[arrIndex % colorList.length]
          }
        };
      });
      const layout = {
        title: '多光谱叠加对比图',
        xaxis: { title: '波长 (nm)' },
        yaxis: { title: '强度/吸光度' },
        showlegend: true
      };
      Plotly.newPlot('plot', traces, layout);
    }
  </script>
</body>
</html>
